name: ruff

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ruff:
    runs-on: namespace-profile-ubuntu-2-cores
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/ruff-action@v4.1.0

