name: kcl-wasm-lib-build-and-publish

on:
  pull_request:

permissions:
  id-token: write
  contents: write

jobs:
  publish-kcl-wasm-lib:
    name: kcl-wasm-lib-build-and-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - run: npm install

      - name: Use correct Rust toolchain
        shell: bash
        run: |
          [ -e rust-toolchain.toml ] || cp rust/rust-toolchain.toml ./

      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ''

      - uses: taiki-e/install-action@7a4939c09608b2a1986b484eca1d16fd0db8ebef
        with:
          tool: wasm-pack

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build Wasm
        run: npm run build:wasm

      - name: Skip tag creation for CI testing
        working-directory: rust/kcl-wasm-lib/pkg
        run: |
          echo "Skipping tag creation/push for CI testing."
          echo "Would have tagged: v$(cat package.json | jq -r .version)"

      - name: Publish package
        working-directory: rust/kcl-wasm-lib/pkg
        run: npm publish --access public --provenance --dry-run
