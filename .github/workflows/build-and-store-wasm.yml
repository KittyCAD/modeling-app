name: Build, Store, and Publish kcl-wasm-lib

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build-and-upload:
    runs-on: namespace-profile-ubuntu-8-cores
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Use correct Rust toolchain
        shell: bash
        run: |
          [ -e rust-toolchain.toml ] || cp rust/rust-toolchain.toml ./
      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false # Configured below.
          rustflags: '' # Use .cargo/config.toml
      - uses: taiki-e/install-action@493d7f216ecab2af0602481ce809ab2c72836fa1
        with:
          tool: wasm-pack
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: build wasm
        run: npm run build:wasm


      # Upload the Wasm bundle as an artifact
      - uses: actions/upload-artifact@v7
        with:
          name: wasm-bundle
          path: rust/kcl-wasm-lib/pkg

  npm-publish-kcl-wasm-lib:
    needs: build-and-upload
    runs-on: namespace-profile-ubuntu-2-cores
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v8
        with:
          name: wasm-bundle
          path: rust/kcl-wasm-lib/pkg

      - name: Check whether npm version already exists
        id: npm_version
        working-directory: rust/kcl-wasm-lib/pkg
        shell: bash
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ steps.npm_version.outputs.should_publish == 'true' }}
        working-directory: rust/kcl-wasm-lib/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
